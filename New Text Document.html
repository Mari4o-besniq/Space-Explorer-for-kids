<!DOCTYPE html>
<html>
<head>
<title>Space Explorer 🚀</title>

<style>
body{
margin:0;
font-family:Arial;
color:white;
text-align:center;
background:black;
overflow:hidden;
}

/* Звезден фон */
.stars{
position:fixed;
width:100%;
height:100%;
background: url('https://www.transparenttextures.com/patterns/stardust.png');
z-index:-1;
}

/* Бутони */
button{
padding:12px;
margin:8px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
}

button:hover{
background-color:gray;
}

img{
width:250px;
margin-top:20px;
border-radius:15px;
}

.container{
margin-top:40px;
}
</style>

</head>

<body>

<div class="stars"></div>

<h1>🚀 Space Explorer</h1>

<div class="container">

<h2>🪐 Planets</h2>

<button onclick="showPlanet('earth')">Earth</button>
<button onclick="showPlanet('mars')">Mars</button>
<button onclick="showPlanet('jupiter')">Jupiter</button>
<button onclick="showPlanet('venus')">Venus</button>

<p id="info"></p>
<img id="planetImage" src="">

<h2>🎮 Quiz Game</h2>
<p id="question">Which planet is the Red Planet?</p>

<button onclick="answer('earth')">Earth</button>
<button onclick="answer('mars')">Mars</button>
<button onclick="answer('jupiter')">Jupiter</button>

<p id="result"></p>

</div>

<script>

function showPlanet(planet){

if(planet === "earth"){
document.getElementById("info").innerText =
"Earth is the only planet with life.";
document.getElementById("planetImage").src =
"https://upload.wikimedia.org/wikipedia/commons/9/97/The_Earth_seen_from_Apollo_17.jpg";
}

if(planet === "mars"){
document.getElementById("info").innerText =
"Mars is called the Red Planet.";
document.getElementById("planetImage").src =
"https://upload.wikimedia.org/wikipedia/commons/0/02/OSIRIS_Mars_true_color.jpg";
}

if(planet === "jupiter"){
document.getElementById("info").innerText =
"Jupiter is the biggest planet.";
document.getElementById("planetImage").src =
"https://upload.wikimedia.org/wikipedia/commons/e/e2/Jupiter.jpg";
}

if(planet === "venus"){
document.getElementById("info").innerText =
"Venus is the hottest planet.";
document.getElementById("planetImage").src =
"https://upload.wikimedia.org/wikipedia/commons/e/e5/Venus-real_color.jpg";
}

}

function answer(choice){

if(choice === "mars"){
document.getElementById("result").innerText = "✅ Correct!";
}
else{
document.getElementById("result").innerText = "❌ Try again!";
}

}

</script>

</body>
</html>
